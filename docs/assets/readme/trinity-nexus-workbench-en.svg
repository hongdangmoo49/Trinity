<svg width="1040" height="620" viewBox="0 0 1040 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Trinity Nexus Workbench overview</title>
  <desc id="desc">A visual overview of the Trinity Textual Workbench with provider cards, central synthesis, workflow inspector, and composer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1040" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1120"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <linearGradient id="window" x1="88" y1="70" x2="952" y2="570" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="active" x1="416" y1="156" x2="622" y2="258" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16A34A"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <style>
      .font { font-family: Inter, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <rect width="1040" height="620" rx="30" fill="url(#bg)"/>
  <circle cx="922" cy="92" r="138" fill="#22D3EE" fill-opacity="0.08"/>
  <circle cx="136" cy="540" r="170" fill="#F97316" fill-opacity="0.07"/>
  <text x="86" y="50" class="font" fill="#E2E8F0" font-size="26" font-weight="850">Nexus Workbench</text>
  <text x="86" y="78" class="font" fill="#94A3B8" font-size="14">Textual UI for planning, provider status, and execution preflight.</text>

  <g filter="url(#shadow)">
    <rect x="86" y="96" width="868" height="456" rx="24" fill="url(#window)" stroke="#334155"/>
    <rect x="86" y="96" width="868" height="54" rx="24" fill="#020617" fill-opacity="0.72"/>
    <rect x="86" y="130" width="868" height="20" fill="#020617" fill-opacity="0.72"/>
    <circle cx="116" cy="122" r="7" fill="#FB7185"/>
    <circle cx="140" cy="122" r="7" fill="#FBBF24"/>
    <circle cx="164" cy="122" r="7" fill="#34D399"/>
    <text x="192" y="128" class="mono" fill="#E2E8F0" font-size="15" font-weight="700">Trinity v1.0.0 · Nexus · workflow: planning</text>
    <rect x="760" y="111" width="150" height="26" rx="13" fill="#0F172A" stroke="#334155"/>
    <text x="835" y="129" text-anchor="middle" class="font" fill="#93C5FD" font-size="12" font-weight="700">target: current cwd</text>

    <g>
      <rect x="112" y="174" width="248" height="100" rx="16" fill="#0F172A" stroke="#334155"/>
      <text x="134" y="205" class="font" fill="#F8FAFC" font-size="19" font-weight="800">Claude</text>
      <text x="134" y="230" class="font" fill="#FDBA74" font-size="13" font-weight="700">Ready · Architect</text>
      <rect x="260" y="192" width="72" height="28" rx="14" fill="#1E293B" stroke="#F97316" stroke-opacity="0.45"/>
      <text x="296" y="211" text-anchor="middle" class="font" fill="#FED7AA" font-size="12" font-weight="800">idle</text>
      <path d="M134 249 H328" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
      <path d="M134 249 H248" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
    </g>

    <g>
      <rect x="396" y="174" width="248" height="100" rx="16" fill="url(#active)" stroke="#67E8F9" stroke-opacity="0.6"/>
      <text x="418" y="205" class="font" fill="#FFFFFF" font-size="19" font-weight="850">Codex</text>
      <text x="418" y="230" class="font" fill="#ECFEFF" font-size="13" font-weight="700">Running · Implementer</text>
      <rect x="538" y="192" width="78" height="28" rx="14" fill="#022C22" fill-opacity="0.7" stroke="#A7F3D0" stroke-opacity="0.45"/>
      <text x="577" y="211" text-anchor="middle" class="font" fill="#D1FAE5" font-size="12" font-weight="800">active</text>
      <path d="M418 249 H612" stroke="#BAE6FD" stroke-opacity="0.42" stroke-width="2" stroke-linecap="round"/>
      <path d="M418 249 H566" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    </g>

    <g>
      <rect x="680" y="174" width="248" height="100" rx="16" fill="#0F172A" stroke="#334155"/>
      <text x="702" y="205" class="font" fill="#F8FAFC" font-size="19" font-weight="800">Antigravity</text>
      <text x="702" y="230" class="font" fill="#C4B5FD" font-size="13" font-weight="700">Ready · Reviewer</text>
      <rect x="824" y="192" width="72" height="28" rx="14" fill="#1E293B" stroke="#8B5CF6" stroke-opacity="0.45"/>
      <text x="860" y="211" text-anchor="middle" class="font" fill="#DDD6FE" font-size="12" font-weight="800">idle</text>
      <path d="M702 249 H896" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
      <path d="M702 249 H806" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round"/>
    </g>

    <rect x="112" y="302" width="532" height="152" rx="18" fill="#0B1220" stroke="#334155"/>
    <text x="136" y="335" class="font" fill="#F8FAFC" font-size="20" font-weight="850">Central Agent</text>
    <rect x="504" y="316" width="96" height="28" rx="14" fill="#0F766E" fill-opacity="0.45" stroke="#5EEAD4" stroke-opacity="0.45"/>
    <text x="552" y="335" text-anchor="middle" class="font" fill="#CCFBF1" font-size="12" font-weight="800">synthesis</text>
    <text x="136" y="367" class="font" fill="#CBD5E1" font-size="14">· synthesis summary</text>
    <text x="136" y="396" class="font" fill="#CBD5E1" font-size="14">· questions for the user</text>
    <text x="136" y="425" class="font" fill="#CBD5E1" font-size="14">· blueprint and work package status</text>

    <rect x="676" y="302" width="252" height="152" rx="18" fill="#0B1220" stroke="#334155"/>
    <text x="700" y="334" class="font" fill="#F8FAFC" font-size="18" font-weight="850">Workflow Inspector</text>
    <text x="700" y="365" class="font" fill="#94A3B8" font-size="13">phase: planning</text>
    <text x="700" y="390" class="font" fill="#94A3B8" font-size="13">rounds: 2 / 3</text>
    <text x="700" y="415" class="font" fill="#94A3B8" font-size="13">packages: draft ready</text>

    <rect x="112" y="482" width="816" height="46" rx="16" fill="#020617" stroke="#334155"/>
    <text x="136" y="511" class="mono" fill="#94A3B8" font-size="13">Ask all agents about the next decision...</text>
    <rect x="818" y="491" width="86" height="28" rx="14" fill="#0EA5E9"/>
    <text x="861" y="510" text-anchor="middle" class="font" fill="#F8FAFC" font-size="12" font-weight="850">Send</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="630" y="398" width="260" height="126" rx="18" fill="#172554" stroke="#60A5FA"/>
    <rect x="654" y="422" width="92" height="24" rx="12" fill="#1D4ED8"/>
    <text x="700" y="439" text-anchor="middle" class="font" fill="#DBEAFE" font-size="12" font-weight="800">Provider</text>
    <rect x="756" y="422" width="92" height="24" rx="12" fill="#0F172A" stroke="#60A5FA" stroke-opacity="0.34"/>
    <text x="802" y="439" text-anchor="middle" class="font" fill="#BFDBFE" font-size="12" font-weight="800">Raw output</text>
    <text x="654" y="475" class="font" fill="#E0F2FE" font-size="13" font-weight="700">Provider Inspector modal</text>
    <text x="654" y="498" class="font" fill="#93C5FD" font-size="12">Inspect raw output plus model/session metadata.</text>
  </g>
</svg>
