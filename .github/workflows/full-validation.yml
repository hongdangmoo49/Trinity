name: Full validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-suite:
    name: Ubuntu / Python 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Run full test suite
        run: uv run pytest -q
