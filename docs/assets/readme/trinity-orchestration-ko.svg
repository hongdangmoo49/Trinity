<svg width="960" height="460" viewBox="0 0 960 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Trinity 멀티 에이전트 오케스트레이션</title>
  <desc id="desc">Claude, Codex, Antigravity가 공유 컨텍스트와 합의 엔진을 통해 오케스트레이터로 연결되는 구조도</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#082F49"/>
    </linearGradient>
    <linearGradient id="claude" x1="94" y1="78" x2="286" y2="198" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <linearGradient id="codex" x1="384" y1="78" x2="576" y2="198" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="antigravity" x1="674" y1="78" x2="866" y2="198" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="core" x1="286" y1="276" x2="674" y2="418" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
    <style>
      .font { font-family: Inter, Pretendard, "Noto Sans KR", "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <rect width="960" height="460" rx="28" fill="url(#bg)"/>
  <path d="M48 384 C170 430 320 438 470 410 C630 380 733 424 912 374" stroke="#38BDF8" stroke-opacity="0.14" stroke-width="42" stroke-linecap="round"/>
  <path d="M74 70 H886" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
  <text x="72" y="52" class="font" fill="#E2E8F0" font-size="25" font-weight="800">Trinity Multi-Agent Orchestration</text>
  <text x="72" y="82" class="font" fill="#94A3B8" font-size="14">세 에이전트가 하나의 목표와 컨텍스트를 공유하고, 중앙 합의를 거쳐 작업으로 분배됩니다.</text>

  <g filter="url(#shadow)">
    <rect x="74" y="112" width="232" height="126" rx="18" fill="#0B1220" stroke="#334155"/>
    <rect x="86" y="124" width="54" height="54" rx="16" fill="url(#claude)"/>
    <text x="113" y="159" text-anchor="middle" class="font" fill="#FFFFFF" font-size="23" font-weight="900">C</text>
    <text x="156" y="146" class="font" fill="#F8FAFC" font-size="24" font-weight="800">Claude</text>
    <text x="156" y="174" class="font" fill="#FDBA74" font-size="15" font-weight="700">설계자</text>
    <text x="96" y="210" class="font" fill="#CBD5E1" font-size="13">아키텍처 · 계획 · 설계 검토</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="364" y="112" width="232" height="126" rx="18" fill="#0B1220" stroke="#334155"/>
    <rect x="376" y="124" width="54" height="54" rx="16" fill="url(#codex)"/>
    <text x="403" y="159" text-anchor="middle" class="font" fill="#FFFFFF" font-size="23" font-weight="900">X</text>
    <text x="446" y="146" class="font" fill="#F8FAFC" font-size="24" font-weight="800">Codex</text>
    <text x="446" y="174" class="font" fill="#67E8F9" font-size="15" font-weight="700">구현자</text>
    <text x="386" y="210" class="font" fill="#CBD5E1" font-size="13">코드 구현 · 리팩터링 · 테스트</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="654" y="112" width="232" height="126" rx="18" fill="#0B1220" stroke="#334155"/>
    <rect x="666" y="124" width="54" height="54" rx="16" fill="url(#antigravity)"/>
    <text x="693" y="159" text-anchor="middle" class="font" fill="#FFFFFF" font-size="23" font-weight="900">A</text>
    <text x="736" y="146" class="font" fill="#F8FAFC" font-size="23" font-weight="800">Antigravity</text>
    <text x="736" y="174" class="font" fill="#C4B5FD" font-size="15" font-weight="700">검토자</text>
    <text x="676" y="210" class="font" fill="#CBD5E1" font-size="13">검증 · 리서치 · 경계 조건 분석</text>
  </g>

  <path d="M190 238 V263 C190 282 209 292 240 292 H444" stroke="#94A3B8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
  <path d="M480 238 V274" stroke="#94A3B8" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M770 238 V263 C770 282 751 292 720 292 H516" stroke="#94A3B8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="286" y="276" width="388" height="142" rx="22" fill="url(#core)" stroke="#5EEAD4" stroke-opacity="0.45"/>
    <text x="480" y="313" text-anchor="middle" class="font" fill="#F8FAFC" font-size="25" font-weight="850">오케스트레이터</text>
    <text x="480" y="342" text-anchor="middle" class="font" fill="#CCFBF1" font-size="14">컨텍스트를 정리하고</text>
    <text x="480" y="361" text-anchor="middle" class="font" fill="#CCFBF1" font-size="14">합의 가능한 실행 계획으로 압축합니다.</text>
    <g class="font" font-size="13" font-weight="700">
      <rect x="322" y="380" width="124" height="30" rx="15" fill="#0F172A" fill-opacity="0.72" stroke="#5EEAD4" stroke-opacity="0.34"/>
      <text x="384" y="400" text-anchor="middle" fill="#E0F2FE">공유 컨텍스트</text>
      <rect x="460" y="380" width="104" height="30" rx="15" fill="#0F172A" fill-opacity="0.72" stroke="#5EEAD4" stroke-opacity="0.34"/>
      <text x="512" y="400" text-anchor="middle" fill="#E0F2FE">합의 엔진</text>
      <rect x="578" y="380" width="92" height="30" rx="15" fill="#0F172A" fill-opacity="0.72" stroke="#5EEAD4" stroke-opacity="0.34"/>
      <text x="624" y="400" text-anchor="middle" fill="#E0F2FE">작업 분배</text>
    </g>
  </g>
</svg>
