name: Cross-platform smoke

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Classify CI change scope
        id: ci-mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "ci_mode=required_smoke" >> "$GITHUB_OUTPUT"
            echo "changed_count=unknown" >> "$GITHUB_OUTPUT"
          elif ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null || ! git cat-file -e "$HEAD_SHA^{commit}" 2>/dev/null; then
            echo "ci_mode=required_smoke" >> "$GITHUB_OUTPUT"
            echo "changed_count=unknown" >> "$GITHUB_OUTPUT"
          else
            uv run python scripts/classify_ci_change.py "$BASE_SHA" "$HEAD_SHA" --github-output >> "$GITHUB_OUTPUT"
          fi

      - name: Show CI mode
        shell: bash
        run: |
          echo "ci_mode=${{ steps.ci-mode.outputs.ci_mode }}"
          echo "changed_count=${{ steps.ci-mode.outputs.changed_count }}"

      - name: Run required smoke tests
        if: steps.ci-mode.outputs.ci_mode != 'docs_version_only'
        run: uv run python scripts/run_required_smoke_tests.py -q

      - name: Validate docs/version-only fast path
        if: steps.ci-mode.outputs.ci_mode == 'docs_version_only'
        run: uv run python scripts/run_required_smoke_tests.py --list

      - name: Build wheel
        run: |
          uv run python -c "import shutil; shutil.rmtree('dist-smoke', ignore_errors=True)"
          uv build --out-dir dist-smoke

      - name: Install wheel and smoke console script
        shell: bash
        run: |
          uv run python -m venv .venv-smoke
          if [ "$RUNNER_OS" = "Windows" ]; then
            .venv-smoke/Scripts/python -m pip install dist-smoke/*.whl
            .venv-smoke/Scripts/trinity.exe --version
            .venv-smoke/Scripts/trinity.exe init --non-interactive
            .venv-smoke/Scripts/trinity.exe doctor
            .venv-smoke/Scripts/trinity.exe bootstrap --check-only --agents claude
          else
            .venv-smoke/bin/python -m pip install dist-smoke/*.whl
            .venv-smoke/bin/trinity --version
            .venv-smoke/bin/trinity init --non-interactive
            .venv-smoke/bin/trinity doctor
            .venv-smoke/bin/trinity bootstrap --check-only --agents claude
          fi
