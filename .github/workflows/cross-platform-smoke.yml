name: Cross-platform smoke

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Run targeted tests
        run: >
          uv run pytest
          tests/test_platform_capabilities.py
          tests/test_platform_process.py
          tests/test_log_tail.py
          tests/test_provider_bootstrap.py
          tests/test_tui_rendering.py
          tests/test_cli.py

      - name: Build wheel
        run: uv build

      - name: Install wheel and smoke console script
        shell: bash
        run: |
          uv run python -m venv .venv-smoke
          if [ "$RUNNER_OS" = "Windows" ]; then
            .venv-smoke/Scripts/python -m pip install dist/*.whl
            .venv-smoke/Scripts/trinity.exe --version
            .venv-smoke/Scripts/trinity.exe init --non-interactive
            .venv-smoke/Scripts/trinity.exe doctor
            .venv-smoke/Scripts/trinity.exe bootstrap --check-only --agents claude
          else
            .venv-smoke/bin/python -m pip install dist/*.whl
            .venv-smoke/bin/trinity --version
            .venv-smoke/bin/trinity init --non-interactive
            .venv-smoke/bin/trinity doctor
            .venv-smoke/bin/trinity bootstrap --check-only --agents claude
          fi
